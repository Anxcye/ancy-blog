# File: build-images.yml
# Purpose: Build and publish production container images to GitHub Container Registry.
# Module: github-actions deployment, image build workflow layer.
# Related: backend/Dockerfile, frontend-blog/Dockerfile, frontend-admin-react/Dockerfile.

name: build-images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAMESPACE: anxcye/ancy-blog
      APP_DOMAIN: ${{ vars.APP_DOMAIN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            build_args: ''
          - image_name: frontend-blog
            context: ./frontend-blog
            dockerfile: ./frontend-blog/Dockerfile
            build_args: |
              NUXT_PUBLIC_API_BASE=https://${{ vars.APP_DOMAIN }}/api/v1
          - image_name: frontend-admin-react
            context: ./frontend-admin-react
            dockerfile: ./frontend-admin-react/Dockerfile
            build_args: |
              VITE_API_BASE_URL=https://${{ vars.APP_DOMAIN }}/api/v1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image_name }}
          tags: |
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Validate domain variable
        if: matrix.image_name != 'backend'
        run: |
          test -n "${APP_DOMAIN}" || {
            echo "Repository variable APP_DOMAIN is required for frontend image builds." >&2
            exit 1
          }

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
