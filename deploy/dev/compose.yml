# File: compose.yml
# Purpose: Run local development infrastructure dependencies.
# Module: deploy/dev Docker Compose orchestration layer.
# Related: dev-env.sh, .env.example, backend/.env.example.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ancy_blog}
      POSTGRES_USER: ${POSTGRES_USER:-ancy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ancy_dev_password}
      TZ: ${TZ:-Asia/Singapore}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dev

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    volumes:
      - redis_data:/data
    networks:
      - dev

volumes:
  postgres_data:
  redis_data:

networks:
  dev:
